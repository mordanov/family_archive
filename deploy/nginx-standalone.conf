# Standalone nginx config used by family-archive/docker-compose.yml only.
# When integrated into the shared web-folders stack, the templates under
# web-folders/nginx/templates/archive-*.conf.template are used instead.

upstream archive_backend  { server archive-backend:8000; }
upstream archive_frontend { server archive-frontend:80;  }

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80 default_server;
    server_name _;

    # Allow large chunked uploads (one chunk = up to ~8 MB; we round up).
    client_max_body_size 32m;
    client_body_buffer_size 1m;

    # Long-running operations (multipart complete, large downloads).
    proxy_read_timeout 600s;
    proxy_send_timeout 600s;

    # Pass byte-Range requests through cleanly.
    proxy_buffering off;
    proxy_request_buffering off;

    # Backend
    location /api/ {
        proxy_pass http://archive_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Health (cheap, unauthenticated)
    location = /health {
        proxy_pass http://archive_backend;
        access_log off;
    }

    # Frontend SPA
    location / {
        proxy_pass http://archive_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript application/xml image/svg+xml;
}

