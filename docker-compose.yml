services:
  archive-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://archive_user:archive_pass@localhost:5432/archive}
      SECRET_KEY: ${SECRET_KEY:-change-me-archive-secret}
      COOKIE_SECURE: ${COOKIE_SECURE:-1}
      COOKIE_DOMAIN: ${COOKIE_DOMAIN:-}
      SESSION_LIFETIME_DAYS: ${SESSION_LIFETIME_DAYS:-30}
      ARCHIVE_USER1_USERNAME: ${ARCHIVE_USER1_USERNAME:-user1}
      ARCHIVE_USER1_PASSWORD: ${ARCHIVE_USER1_PASSWORD:-change-me-1}
      ARCHIVE_USER2_USERNAME: ${ARCHIVE_USER2_USERNAME:-user2}
      ARCHIVE_USER2_PASSWORD: ${ARCHIVE_USER2_PASSWORD:-change-me-2}
      S3_ENDPOINT_URL: ${S3_ENDPOINT_URL:-http://localhost:9000}
      S3_REGION: ${S3_REGION:-fsn1}
      S3_BUCKET: ${S3_BUCKET:-family-archive}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-}
      S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE:-1}
      MAX_FILE_SIZE_BYTES: ${MAX_FILE_SIZE_BYTES:-21474836480}
      CHUNK_SIZE_BYTES: ${CHUNK_SIZE_BYTES:-8388608}
      TRASH_RETENTION_DAYS: ${TRASH_RETENTION_DAYS:-30}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:5173,http://localhost}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  archive-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    expose:
      - "80"
    depends_on:
      - archive-backend
