services:
  archive-db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: archive
      POSTGRES_USER: archive_user
      POSTGRES_PASSWORD: archive_password
    ports:
      - "5433:5432"
    volumes:
      - archive_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U archive_user -d archive"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - archive_minio_data:/data

  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until /usr/bin/mc alias set local http://minio:9000 minioadmin minioadmin; do sleep 1; done;
      /usr/bin/mc mb -p local/family-archive || true;
      exit 0;
      "

  archive-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://archive_user:archive_password@archive-db:5432/archive
      SECRET_KEY: dev-secret
      COOKIE_SECURE: "0"
      ARCHIVE_USER1_USERNAME: user1
      ARCHIVE_USER1_PASSWORD: pass1
      ARCHIVE_USER2_USERNAME: user2
      ARCHIVE_USER2_PASSWORD: pass2
      S3_ENDPOINT_URL: http://minio:9000
      S3_REGION: us-east-1
      S3_BUCKET: family-archive
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_FORCE_PATH_STYLE: "1"
      ALLOWED_ORIGINS: http://localhost:5173
      LOG_LEVEL: INFO
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    depends_on:
      archive-db:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully

  archive-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - archive-backend

volumes:
  archive_pg_data:
  archive_minio_data:


