name: family-archive CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: family-archive-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-tests:
    name: Backend tests (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends ffmpeg libmagic1

      - name: Install Python deps
        run: pip install -r requirements-dev.txt

      - name: Run pytest
        run: pytest -q

  frontend-tests:
    name: Frontend tests (vitest) + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci

      - name: Test
        run: npm test --silent

      - name: Build
        run: npm run build

  docker-build:
    name: Docker build (sanity)
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: false
          tags: family-archive-backend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: false
          tags: family-archive-frontend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  validate-config:
    name: Validate Configs
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Validate standalone docker-compose
        env:
          ARCHIVE_POSTGRES_PASSWORD: x
          ARCHIVE_SECRET_KEY: x
          ARCHIVE_USER1_PASSWORD: x
          ARCHIVE_USER2_PASSWORD: x
          ARCHIVE_S3_ENDPOINT_URL: https://example.com
          ARCHIVE_S3_BUCKET: x
          ARCHIVE_S3_ACCESS_KEY: x
          ARCHIVE_S3_SECRET_KEY: x
        run: docker compose -f docker-compose.yml config > /dev/null

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: [docker-build, validate-config]
    if: github.event_name != 'pull_request'
    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Deploy
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PORT: ${{ secrets.VPS_PORT || 22 }}
          VPS_ARCHIVE_DIR: ${{ secrets.VPS_ARCHIVE_DIR }}
          REPO: ${{ github.repository }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          ssh -p "$VPS_PORT" "$VPS_USER@$VPS_HOST" \
            "bash -se -- '$REPO' '$REF_NAME' '$VPS_ARCHIVE_DIR'" << 'EOF'

          set -e

          REPO="$1"
          REF_NAME="$2"
          ARCHIVE_DIR="${3:-$HOME/family-archive}"

          git config --global --add safe.directory '*'

          PREVIOUS_COMMIT=""

          debug_dump() {
            cd "$ARCHIVE_DIR" || return 0
            docker compose -f docker-compose.yml ps || true
            docker compose -f docker-compose.yml logs --no-color --tail=200 archive-db || true
            docker compose -f docker-compose.yml logs --no-color --tail=200 archive-backend || true
            docker compose -f docker-compose.yml logs --no-color --tail=200 archive-frontend || true
            docker compose -f docker-compose.yml logs --no-color --tail=200 nginx || true
          }

          mkdir -p "$ARCHIVE_DIR"
          cd "$ARCHIVE_DIR"

          if [ ! -d .git ]; then
            git clone "https://github.com/$REPO.git" .
          fi

          PREVIOUS_COMMIT=$(git rev-parse HEAD || echo "")

          git fetch origin --prune
          git checkout "$REF_NAME"
          git reset --hard "origin/$REF_NAME"

          if [ ! -f ./deploy/deploy.sh ]; then
            echo "deploy/deploy.sh not found in $ARCHIVE_DIR" >&2
            exit 1
          fi

          if [ ! -f ./.env ]; then
            echo ".env not found in $ARCHIVE_DIR — refusing to deploy without secrets." >&2
            exit 1
          fi

          chmod +x ./deploy/deploy.sh

          if ! bash ./deploy/deploy.sh; then
            debug_dump
            if [ -n "$PREVIOUS_COMMIT" ]; then
              echo "Rolling back to $PREVIOUS_COMMIT..."
              git reset --hard "$PREVIOUS_COMMIT"
              bash ./deploy/deploy.sh || true
            fi
            exit 1
          fi

          docker compose -f docker-compose.yml ps

          EOF

      - name: Deploy failed notification
        if: failure()
        run: echo "❌ family-archive deployment failed!"
