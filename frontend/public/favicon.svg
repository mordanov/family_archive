<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" fill="#0f1115"/>

  <!-- Folder icon -->
  <g fill="#6366f1">
    <!-- Folder tab -->
    <rect x="80" y="120" width="140" height="80" rx="8" fill="none" stroke="#6366f1" stroke-width="28"/>
    <!-- Folder body -->
    <rect x="60" y="180" width="380" height="220" rx="12" fill="none" stroke="#6366f1" stroke-width="28"/>
    <!-- Files inside -->
    <rect x="100" y="240" width="280" height="60" rx="6" fill="none" stroke="#6366f1" stroke-width="18" opacity="0.7"/>
  </g>
</svg>

